<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lentera — Sedang Offline</title>
<style>
  :root{color-scheme:light dark}
  *{margin:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#F5F1E8;color:#3A2E1E;
    background-image:radial-gradient(120% 90% at 50% -10%,rgba(139,46,46,.10),transparent 60%);
  }
  @media (prefers-color-scheme:dark){
    body{background:#17140F;color:#EFE6D3;background-image:radial-gradient(120% 90% at 50% -10%,rgba(180,70,70,.18),transparent 60%)}
    .card{background:#221E17 !important;border-color:#383227 !important}
    .sub{color:#B4A78D !important}
  }
  .card{
    background:#fff;border:1px solid #E8DDC5;border-radius:18px;padding:34px 30px;max-width:400px;text-align:center;
    box-shadow:0 10px 30px rgba(58,46,30,.10);
  }
  .badge{
    width:76px;height:76px;border-radius:20px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(125% 125% at 30% 22%,#A23A34,#8B2E2E 45%,#5E1F1F);position:relative;
  }
  .badge .l{font-family:Georgia,serif;font-weight:700;font-size:42px;color:#EAD8A2;line-height:1}
  .badge .flame{position:absolute;top:11px;left:50%;transform:translateX(-10%);width:15px;height:15px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    background:radial-gradient(circle at 50% 65%,#FBEFC4,#E3C05A 55%,#C9992F);box-shadow:0 0 14px rgba(240,205,110,.9)}
  h1{font-family:Georgia,serif;font-size:22px;font-weight:600;margin-bottom:8px}
  .sub{color:#6E5E46;font-size:14.5px;line-height:1.6;margin-bottom:22px}
  button{
    appearance:none;border:0;cursor:pointer;font:inherit;font-weight:600;font-size:15px;
    background:#8B2E2E;color:#fff;padding:12px 22px;border-radius:11px;transition:background .15s;
  }
  button:hover{background:#7A2828}
  .hint{margin-top:16px;font-size:12.5px;color:#9a8b70}
</style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="flame"></span><span class="l">L</span></div>
    <h1>Anda sedang offline</h1>
    <p class="sub">Lentera butuh koneksi internet untuk menampilkan data terbaru. Periksa koneksi Anda, lalu coba lagi.</p>
    <button onclick="location.reload()">Coba Lagi</button>
    <p class="hint">Data keuangan selalu diambil langsung dari server — tidak ada versi lama yang tersimpan di perangkat.</p>
  </div>
</body>
</html>
