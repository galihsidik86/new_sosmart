services:
  postgres:
    image: postgres:16-alpine
    container_name: lentera_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lentera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lentera_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-lentera}
      APP_DB_USER: ${APP_DB_USER:-lentera_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-lentera_app_pwd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lentera_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lentera} -d ${POSTGRES_DB:-lentera}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lentera_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - lentera_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lentera_pgdata:
  lentera_redisdata:
